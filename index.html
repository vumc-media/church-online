<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VUMC Watch Live</title>

<style>
html, body{
  margin:0;
  height:100%;
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
}

/* THIS is the fix — full screen centering */
body{
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Player container */
#vumc-live-panel{
  width:100%;
  max-width:960px;
}

/* 16:9 player frame */
.vumc-frame{
  position:relative;
  width:100%;
  aspect-ratio:16 / 9;
  border-radius:18px;
  overflow:hidden;
  background:#000;
}

/* YouTube */
.vumc-player{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  z-index:1;
}

/* Overlay background */
.vumc-bg{
  position:absolute;
  inset:0;
  z-index:2;
  background:
    linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.4)),
    url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVeu24CGoxKiGKIMqt16SMry2rYHrAFStWTA&s");
  background-size:cover;
  background-position:center;
  transition:.3s;
}

.vumc-bg.hidden{opacity:0}

/* Content */
.vumc-content{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:3;
  color:#fff;
}

.vumc-content.hidden{opacity:0}

.vumc-title{font-size:34px;font-weight:700}
.vumc-date{margin:10px 0 16px}

.vumc-timer{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:14px;
}

.vumc-box{
  background:rgba(0,0,0,.5);
  padding:12px;
  border-radius:10px;
}

.vumc-times{margin-bottom:12px}

.vumc-visit-btn{
  background:#d4af37;
  color:#000;
  padding:10px 18px;
  border-radius:999px;
  text-decoration:none;
  font-weight:700;
}

/* LIVE badge */
.vumc-live-badge{
  position:absolute;
  bottom:12px;
  left:12px;
  background:#000;
  padding:6px 10px;
  border-radius:999px;
  display:none;
  z-index:5;
}

.vumc-live-badge.show{display:block}
</style>
</head>

<body>

<div id="vumc-live-panel">
  <div class="vumc-frame">

    <iframe id="vumc-player" class="vumc-player"></iframe>

    <div class="vumc-bg" id="bg"></div>

    <div class="vumc-content" id="overlay">
      <div>
        <div class="vumc-title">Next Service Begins In</div>
        <div class="vumc-date" id="date"></div>

        <div class="vumc-timer">
          <div class="vumc-box"><span id="d"></span><br>D</div>
          <div class="vumc-box"><span id="h"></span><br>H</div>
          <div class="vumc-box"><span id="m"></span><br>M</div>
          <div class="vumc-box"><span id="s"></span><br>S</div>
        </div>

        <div class="vumc-times">
          Traditional 9:30AM<br>Contemporary 10:30AM
        </div>

        <a class="vumc-visit-btn" href="https://www.versaillesumc.org/plan-your-visit" target="_blank">
          PLAN YOUR VISIT
        </a>
      </div>
    </div>

    <div class="vumc-live-badge" id="live">LIVE</div>

  </div>
</div>

<script>
const API_KEY = "AIzaSyB399WgOmDUGG6pyoq0oo1Rdzi3iBjwnXE";
const CHANNEL_ID = "UC_svgodM3blLqWEBQ5yNjmA";

const player = document.getElementById("vumc-player");
const overlay = document.getElementById("overlay");
const bg = document.getElementById("bg");
const live = document.getElementById("live");

/* Countdown */
function nextSunday(){
  const now = new Date();
  const day = now.getDay();
  const diff = (7 - day) || 7;
  const next = new Date(now);
  next.setDate(now.getDate()+diff);
  next.setHours(9,30,0);
  return next;
}

function tick(){
  const now = new Date();
  const target = nextSunday();
  const diff = target - now;

  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff%86400000/3600000);
  const m = Math.floor(diff%3600000/60000);
  const s = Math.floor(diff%60000/1000);

  document.getElementById("d").textContent=d;
  document.getElementById("h").textContent=h;
  document.getElementById("m").textContent=m;
  document.getElementById("s").textContent=s;

  document.getElementById("date").textContent=target.toDateString();
}
setInterval(tick,1000); tick();

/* Live detection */
async function checkLive(){
  try{
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`);
    const data = await res.json();

    if(data.items.length){
      const id = data.items[0].id.videoId;
      player.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
      overlay.classList.add("hidden");
      bg.classList.add("hidden");
      live.classList.add("show");
    } else {
      player.src = `https://www.youtube.com/embed/live_stream?channel=${CHANNEL_ID}`;
    }
  }catch(e){}
}

checkLive();
setInterval(checkLive,60000);
</script>

</body>
</html>
