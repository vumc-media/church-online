<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VUMC Watch Live</title>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
}

#vumcWrap{
  width:100%;
  max-width:960px;
  padding:20px;
  box-sizing:border-box;
}

#vumcFrame{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  border-radius:18px;
  overflow:hidden;
  background:#000;
}

#vumcLiveFrame{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  display:none;
}

#vumcOffline{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  padding:24px;
  box-sizing:border-box;
  background:
    linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
    url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVeu24CGoxKiGKIMqt16SMry2rYHrAFStWTA&s') center/cover no-repeat;
}

#vumcInner{
  max-width:700px;
  width:100%;
}

#vumcTitle{
  font-size:clamp(22px,3vw,34px);
  font-weight:700;
  margin-bottom:18px;
}

#vumcCountdown{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.vumcBox{
  min-width:70px;
  padding:14px 10px;
  border-radius:14px;
  background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.2);
  font-size:clamp(22px,4vw,36px);
  font-weight:700;
}

.vumcLabel{
  font-size:12px;
  margin-top:6px;
  text-transform:uppercase;
}

.vumcTimes{
  margin-bottom:14px;
  font-size:clamp(14px,2vw,18px);
}

#vumcBtn{
  display:inline-block;
  background:#d4af37;
  color:#000;
  padding:12px 20px;
  border-radius:999px;
  text-decoration:none;
  font-weight:800;
  margin-bottom:12px;
}

.vumc-desktop{ display:block; }
.vumc-mobile{ display:none; }

@media (max-width: 767px){
  body{ align-items:flex-start; }

  .vumc-desktop{ display:none; }
  .vumc-mobile{ display:block; }

  #vumcWrap{ padding:12px; }
}
</style>
</head>

<body>

<div id="vumcWrap">
  <div id="vumcFrame">

    <iframe id="vumcLiveFrame"></iframe>

    <div id="vumcOffline">
      <div id="vumcInner">

        <div id="vumcTitle">Next Service Begins In</div>

        <div id="vumcCountdown" class="vumc-desktop">
          <div>
            <div id="d" class="vumcBox">00</div>
            <div class="vumcLabel">Days</div>
          </div>
          <div>
            <div id="h" class="vumcBox">00</div>
            <div class="vumcLabel">Hours</div>
          </div>
          <div>
            <div id="m" class="vumcBox">00</div>
            <div class="vumcLabel">Min</div>
          </div>
          <div>
            <div id="s" class="vumcBox">00</div>
            <div class="vumcLabel">Sec</div>
          </div>
        </div>

        <div class="vumc-mobile vumcTimes">
          Traditional Worship — 9:30am<br>
          Contemporary Worship — 10:30am
        </div>

        <div class="vumcTimes vumc-desktop">
          Traditional Worship — 9:30am<br>
          Contemporary Worship — 10:30am
        </div>

        <a id="vumcBtn" href="https://www.versaillesumc.org/plan-your-visit" target="_blank" rel="noopener">
          PLAN YOUR VISIT
        </a>

        <div style="font-size:13px;opacity:.85;">
          Live video will appear automatically when active
        </div>

      </div>
    </div>

  </div>
</div>

<script>
(async function () {

const endpoint = "https://script.google.com/macros/s/AKfycbxClNiX6jIT7ykEIox3Qw-dzynO4TgGhqbdTTzOzESS9C8ZxCRNiLLAuc3bSYFKVbg/exec";

const frame = document.getElementById("vumcLiveFrame");
const offline = document.getElementById("vumcOffline");

let currentVideo = "";

function getNextServiceDate(){
  const now = new Date();
  const day = now.getDay();

  const traditional = new Date(now);
  traditional.setHours(9,30,0,0);

  const contemporary = new Date(now);
  contemporary.setHours(10,30,0,0);

  if(day === 0){
    if(now < traditional) return traditional;
    if(now < contemporary) return contemporary;
  }

  const nextSunday = new Date(now);
  const daysUntilSunday = ((7 - day) % 7) || 7;
  nextSunday.setDate(now.getDate() + daysUntilSunday);
  nextSunday.setHours(9,30,0,0);
  return nextSunday;
}

function tick(){
  const now = new Date();
  const target = getNextServiceDate();
  let diff = Math.floor((target - now) / 1000);

  if(diff < 0) diff = 0;

  const d = Math.floor(diff / 86400);
  diff %= 86400;
  const h = Math.floor(diff / 3600);
  diff %= 3600;
  const m = Math.floor(diff / 60);
  const s = diff % 60;

  document.getElementById("d").textContent = String(d).padStart(2,"0");
  document.getElementById("h").textContent = String(h).padStart(2,"0");
  document.getElementById("m").textContent = String(m).padStart(2,"0");
  document.getElementById("s").textContent = String(s).padStart(2,"0");
}

async function checkLive(){
  try{
    const res = await fetch(endpoint + "?t=" + Date.now(), {
      method: "GET",
      cache: "no-store"
    });

    if(!res.ok) throw new Error("HTTP " + res.status);

    const data = await res.json();

    if(data && data.ok && data.live && data.videoId){
      if(currentVideo !== data.videoId){
        currentVideo = data.videoId;
        frame.src = "https://www.youtube.com/embed/" + data.videoId + "?autoplay=1&mute=1&rel=0";
      }

      frame.style.display = "block";
      offline.style.display = "none";
    } else {
      currentVideo = "";
      frame.src = "";
      frame.style.display = "none";
      offline.style.display = "flex";
    }

  } catch(e){
    currentVideo = "";
    frame.src = "";
    frame.style.display = "none";
    offline.style.display = "flex";
  }
}

tick();
setInterval(tick, 1000);

await checkLive();
setInterval(checkLive, 30000);

})();
</script>

</body>
</html>
