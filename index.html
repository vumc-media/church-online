<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VUMC Watch Live</title>

<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    min-height: 100vh;
    background: #0f1115;
  }

  a { color: inherit; }

  #vumcApp {
    width: 100%;
    min-height: 100vh;
  }

  #vumcShell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    min-height: 100vh;
  }

  #vumcMain {
    background: #000;
  }

  #vumcWrap {
    width: 100%;
    height: 100%;
  }

  #vumcFrame {
    position: relative;
    width: 100%;
    min-height: 100vh;
    overflow: hidden;
    background: #000;
  }

  #vumcLiveFrame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: none;
    background: #000;
  }

  #vumcOffline {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
    padding: 24px;
    background:
      linear-gradient(rgba(0,0,0,.38), rgba(0,0,0,.38)),
      url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVeu24CGoxKiGKIMqt16SMry2rYHrAFStWTA&s') center/cover no-repeat;
  }

  #vumcInner {
    max-width: 720px;
    width: 100%;
    background: rgba(16,18,24,.70);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 24px;
    padding: 28px 22px;
    backdrop-filter: blur(8px);
  }

  #vumcTitle {
    font-size: clamp(24px, 3vw, 38px);
    font-weight: 800;
    margin-bottom: 16px;
    line-height: 1.15;
  }

  #vumcCountdown {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .vumcBoxWrap {
    min-width: 76px;
  }

  .vumcBox {
    min-width: 76px;
    padding: 14px 10px;
    border-radius: 14px;
    background: #fff;
    color: #111;
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 800;
    line-height: 1;
  }

  .vumcLabel {
    font-size: 11px;
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: .04em;
    font-weight: 700;
  }

  .vumcTimes {
    margin-bottom: 14px;
    font-size: clamp(14px, 2vw, 18px);
    line-height: 1.5;
  }

  #vumcBtn {
    display: inline-block;
    background: #d4af37;
    color: #000;
    padding: 12px 20px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .vumcNote {
    font-size: 13px;
    opacity: .88;
  }

  #vumcSidebar {
    background: #15181f;
    border-left: 1px solid rgba(255,255,255,.08);
    min-height: 100vh;
  }

  #vumcSidebarInner {
    padding: 16px;
  }

  .vumcPanel {
    margin-bottom: 16px;
  }

  .vumcPanelTitle {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .05em;
    opacity: .9;
    margin-bottom: 10px;
    font-weight: 700;
  }

  .vumcCard {
    background: #262a33;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 16px;
    padding: 14px;
  }

  .vumcHidden {
    display: none !important;
  }

  #vumcNotesFrame {
    width: 100%;
    height: 540px;
    border: 0;
    border-radius: 12px;
    background: #fff;
  }

  #vumcBibleQuery,
  #vumcBibleVersion {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.12);
    background: #1d2129;
    color: #fff;
    margin-bottom: 10px;
    font-size: 14px;
  }

  #vumcBibleBtn {
    width: 100%;
    padding: 12px;
    border: 0;
    border-radius: 12px;
    background: #d4af37;
    color: #111;
    font-weight: 800;
    cursor: pointer;
    margin-bottom: 12px;
  }

  #vumcBibleFrame {
    width: 100%;
    height: 420px;
    border: 0;
    border-radius: 12px;
    background: #fff;
  }

  .vumcBibleHint {
    font-size: 12px;
    opacity: .78;
    line-height: 1.4;
    margin-top: 8px;
  }

  @media (max-width: 980px) {
    #vumcShell {
      grid-template-columns: 1fr;
    }

    #vumcSidebar {
      display: none;
    }

    #vumcFrame {
      min-height: auto;
      aspect-ratio: 16 / 9;
    }
  }

  @media (max-width: 767px) {
    #vumcInner {
      padding: 20px 14px;
    }

    .vumcBoxWrap {
      min-width: 64px;
    }

    .vumcBox {
      min-width: 64px;
      font-size: 22px;
      padding: 12px 8px;
    }

    .vumcTimes {
      font-size: 14px;
    }
  }
</style>
</head>
<body>

<div id="vumcApp">
  <div id="vumcShell">

    <main id="vumcMain">
      <div id="vumcWrap">
        <div id="vumcFrame">

          <iframe
            id="vumcLiveFrame"
            title="Versailles UMC Live"
            allow="autoplay; encrypted-media; picture-in-picture; web-share"
            allowfullscreen>
          </iframe>

          <div id="vumcOffline">
            <div id="vumcInner">

              <div id="vumcTitle">Next Service Begins In</div>

              <div id="vumcCountdown">
                <div class="vumcBoxWrap">
                  <div id="d" class="vumcBox">00</div>
                  <div class="vumcLabel">Days</div>
                </div>
                <div class="vumcBoxWrap">
                  <div id="h" class="vumcBox">00</div>
                  <div class="vumcLabel">Hours</div>
                </div>
                <div class="vumcBoxWrap">
                  <div id="m" class="vumcBox">00</div>
                  <div class="vumcLabel">Min</div>
                </div>
                <div class="vumcBoxWrap">
                  <div id="s" class="vumcBox">00</div>
                  <div class="vumcLabel">Sec</div>
                </div>
              </div>

              <div class="vumcTimes">
                Traditional Worship — 9:30am<br>
                Contemporary Worship — 10:30am
              </div>

              <a id="vumcBtn" href="https://www.versaillesumc.org/plan-your-visit" target="_blank" rel="noopener">
                PLAN YOUR VISIT
              </a>

              <div class="vumcNote">
                Live video will appear automatically when active
              </div>

            </div>
          </div>

        </div>
      </div>
    </main>

    <aside id="vumcSidebar">
      <div id="vumcSidebarInner">

        <div id="vumcNotesPanel" class="vumcPanel vumcHidden">
          <div class="vumcPanelTitle">Sermon Notes</div>
          <div class="vumcCard" style="padding:0; overflow:hidden;">
            <iframe
              id="vumcNotesFrame"
              src=""
              title="Sermon Notes">
            </iframe>
          </div>
        </div>

        <div class="vumcPanel">
          <div class="vumcPanelTitle">Bible</div>
          <div class="vumcCard">
            <input
              id="vumcBibleQuery"
              type="text"
              placeholder="Example: John 3:16-17"
            />

            <select id="vumcBibleVersion">
              <option value="CEB">CEB (Common English Bible)</option>
              <option value="NIV">NIV</option>
              <option value="NLT">NLT</option>
              <option value="ESV">ESV</option>
              <option value="NKJV">NKJV</option>
              <option value="KJV">KJV</option>
              <option value="NRSVUE">NRSVUE</option>
              <option value="CSB">CSB</option>
            </select>

            <button id="vumcBibleBtn">Open Passage</button>

            <iframe
              id="vumcBibleFrame"
              title="Bible Passage Viewer"
              src="about:blank">
            </iframe>

            <div class="vumcBibleHint">
              Enter a passage and choose a translation. This desktop panel is designed for larger screens.
            </div>
          </div>
        </div>

      </div>
    </aside>

  </div>
</div>

<script>
(async function () {

  const endpoint = "https://script.google.com/macros/s/AKfycbxClNiX6jIT7ykEIox3Qw-dzynO4TgGhqbdTTzOzESS9C8ZxCRNiLLAuc3bSYFKVbg/exec";

  const frame = document.getElementById("vumcLiveFrame");
  const offline = document.getElementById("vumcOffline");

  const notesPanel = document.getElementById("vumcNotesPanel");
  const notesFrame = document.getElementById("vumcNotesFrame");

  const bibleQuery = document.getElementById("vumcBibleQuery");
  const bibleVersion = document.getElementById("vumcBibleVersion");
  const bibleBtn = document.getElementById("vumcBibleBtn");
  const bibleFrame = document.getElementById("vumcBibleFrame");

  let currentVideo = "";

  const NOTES_URLS = {
    traditional: "https://sermon.versaillesumc.org",
    contemporary: "https://sermon.versaillesumc.org"
  };

  function getNextServiceDate() {
    const now = new Date();
    const day = now.getDay();

    const traditional = new Date(now);
    traditional.setHours(9, 30, 0, 0);

    const contemporary = new Date(now);
    contemporary.setHours(10, 30, 0, 0);

    if (day === 0) {
      if (now < traditional) return traditional;
      if (now < contemporary) return contemporary;
    }

    const nextSunday = new Date(now);
    const daysUntilSunday = ((7 - day) % 7) || 7;
    nextSunday.setDate(now.getDate() + daysUntilSunday);
    nextSunday.setHours(9, 30, 0, 0);
    return nextSunday;
  }

  function getLikelyLiveServiceKey() {
    const now = new Date();
    const day = now.getDay();

    if (day !== 0) return "traditional";

    const minutes = now.getHours() * 60 + now.getMinutes();

    if (minutes >= 9 * 60 + 15 && minutes < 10 * 60 + 15) {
      return "traditional";
    }

    if (minutes >= 10 * 60 + 15 && minutes < 12 * 60) {
      return "contemporary";
    }

    return "traditional";
  }

  function tick() {
    const now = new Date();
    const target = getNextServiceDate();
    let diff = Math.floor((target - now) / 1000);

    if (diff < 0) diff = 0;

    const d = Math.floor(diff / 86400);
    diff %= 86400;
    const h = Math.floor(diff / 3600);
    diff %= 3600;
    const m = Math.floor(diff / 60);
    const s = diff % 60;

    document.getElementById("d").textContent = String(d).padStart(2, "0");
    document.getElementById("h").textContent = String(h).padStart(2, "0");
    document.getElementById("m").textContent = String(m).padStart(2, "0");
    document.getElementById("s").textContent = String(s).padStart(2, "0");
  }

  function showNotes(url) {
    notesPanel.classList.remove("vumcHidden");
    notesFrame.src = url;
  }

  function hideNotes() {
    notesPanel.classList.add("vumcHidden");
    notesFrame.src = "";
  }

  function openBiblePassage() {
    const query = bibleQuery.value.trim();
    const version = bibleVersion.value;

    if (!query) return;

    const url =
      "https://www.biblegateway.com/passage/?search=" +
      encodeURIComponent(query) +
      "&version=" +
      encodeURIComponent(version);

    bibleFrame.src = url;
  }

  bibleBtn.addEventListener("click", openBiblePassage);

  bibleQuery.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      openBiblePassage();
    }
  });

  async function checkLive() {
    try {
      const res = await fetch(endpoint + "?t=" + Date.now(), {
        method: "GET",
        cache: "no-store"
      });

      if (!res.ok) throw new Error("HTTP " + res.status);

      const data = await res.json();

      if (data && data.ok && data.live && data.videoId) {
        if (currentVideo !== data.videoId) {
          currentVideo = data.videoId;
          frame.src = "https://www.youtube.com/embed/" + data.videoId + "?autoplay=1&mute=1&rel=0";
        }

        frame.style.display = "block";
        offline.style.display = "none";

        const serviceKey = data.serviceKey || getLikelyLiveServiceKey();
        const notesUrl = data.notesUrl || NOTES_URLS[serviceKey] || NOTES_URLS.traditional;
        showNotes(notesUrl);

      } else {
        currentVideo = "";
        frame.src = "";
        frame.style.display = "none";
        offline.style.display = "flex";
        hideNotes();
      }

    } catch (e) {
      currentVideo = "";
      frame.src = "";
      frame.style.display = "none";
      offline.style.display = "flex";
      hideNotes();
    }
  }

  tick();
  setInterval(tick, 1000);

  await checkLive();
  setInterval(checkLive, 30000);

})();
</script>

</body>
</html>
