<div style="max-width:960px;margin:0 auto;font-family:Arial,Helvetica,sans-serif;">
  <div style="
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:18px;
    overflow:hidden;
  ">
    <iframe
      id="vumcLiveFrame"
      src=""
      title="Versailles UMC Live"
      frameborder="0"
      allow="autoplay; encrypted-media; picture-in-picture; web-share"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
      style="position:absolute;inset:0;width:100%;height:100%;display:none;">
    </iframe>

    <div id="vumcOffline" style="
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff;
      padding:24px;
      background:
        linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
        url('https://images.unsplash.com/photo-1504052434569-70ad5836ab65?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    ">
      <div>
        <div style="font-size:30px;font-weight:700;line-height:1.15;margin-bottom:10px;">
          VUMC Live
        </div>
        <div style="font-size:16px;line-height:1.5;opacity:.92;">
          Live video will appear here when stream is active.
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(async function () {
  const endpoint = 'https://script.google.com/macros/s/AKfycbxClNiX6jIT7ykEIox3Qw-dzynO4TgGhqbdTTzOzESS9C8ZxCRNiLLAuc3bSYFKVbg/exec';
  const iframe = document.getElementById('vumcLiveFrame');
  const offline = document.getElementById('vumcOffline');
  let currentVideoId = '';

  async function checkLive() {
    try {
      const res = await fetch(endpoint + '?t=' + Date.now(), {
        method: 'GET',
        cache: 'no-store'
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      const data = await res.json();

      if (data && data.ok && data.live && data.videoId) {
        if (currentVideoId !== data.videoId) {
          currentVideoId = data.videoId;
          iframe.src = 'https://www.youtube.com/embed/' + data.videoId + '?autoplay=1&mute=1&rel=0';
        }
        iframe.style.display = 'block';
        offline.style.display = 'none';
      } else {
        currentVideoId = '';
        iframe.src = '';
        iframe.style.display = 'none';
        offline.style.display = 'flex';
      }
    } catch (err) {
      console.log('Live check failed:', err);
      currentVideoId = '';
      iframe.src = '';
      iframe.style.display = 'none';
      offline.style.display = 'flex';
    }
  }

  checkLive();
  setInterval(checkLive, 30000);
})();
</script>
