<div style="max-width:960px;margin:0 auto;font-family:Arial,Helvetica,sans-serif;">
  <div style="
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    border-radius:18px;
    overflow:hidden;
    background:#000;
  ">

    <!-- LIVE PLAYER -->
    <iframe
      id="vumcLiveFrame"
      src=""
      title="Versailles UMC Live"
      frameborder="0"
      allow="autoplay; encrypted-media; picture-in-picture; web-share"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
      style="position:absolute;inset:0;width:100%;height:100%;display:none;">
    </iframe>

    <!-- OFFLINE COUNTDOWN PANEL -->
    <div id="vumcOfflinePanel" style="
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff;
      padding:24px;
      box-sizing:border-box;
      background:
        linear-gradient(rgba(0,0,0,.30),rgba(0,0,0,.30)),
        url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVeu24CGoxKiGKIMqt16SMry2rYHrAFStWTA&s') center/cover no-repeat;
    ">
      <div style="width:100%;max-width:760px;">
        <div id="vumcServiceLabel" style="
          font-size:clamp(20px,3vw,34px);
          font-weight:700;
          line-height:1.2;
          margin-bottom:18px;
          text-shadow:0 2px 8px rgba(0,0,0,.28);
        ">
          Next Service Begins In
        </div>

        <!-- COUNTDOWN BOXES -->
        <div id="vumcCountdownBoxes" style="
          display:flex;
          justify-content:center;
          align-items:center;
          gap:10px;
          flex-wrap:wrap;
          margin-bottom:18px;
        ">
          <div style="display:flex;flex-direction:column;align-items:center;">
            <div id="vumcDays" style="
              min-width:72px;
              padding:14px 10px;
              border-radius:14px;
              background:rgba(0,0,0,.46);
              border:1px solid rgba(255,255,255,.20);
              font-size:clamp(24px,4vw,40px);
              font-weight:700;
              line-height:1;
              box-shadow:0 4px 14px rgba(0,0,0,.18);
            ">00</div>
            <div style="margin-top:6px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;">Days</div>
          </div>

          <div style="font-size:28px;font-weight:700;line-height:1;padding-bottom:18px;">:</div>

          <div style="display:flex;flex-direction:column;align-items:center;">
            <div id="vumcHours" style="
              min-width:72px;
              padding:14px 10px;
              border-radius:14px;
              background:rgba(0,0,0,.46);
              border:1px solid rgba(255,255,255,.20);
              font-size:clamp(24px,4vw,40px);
              font-weight:700;
              line-height:1;
              box-shadow:0 4px 14px rgba(0,0,0,.18);
            ">00</div>
            <div style="margin-top:6px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;">Hours</div>
          </div>

          <div style="font-size:28px;font-weight:700;line-height:1;padding-bottom:18px;">:</div>

          <div style="display:flex;flex-direction:column;align-items:center;">
            <div id="vumcMinutes" style="
              min-width:72px;
              padding:14px 10px;
              border-radius:14px;
              background:rgba(0,0,0,.46);
              border:1px solid rgba(255,255,255,.20);
              font-size:clamp(24px,4vw,40px);
              font-weight:700;
              line-height:1;
              box-shadow:0 4px 14px rgba(0,0,0,.18);
            ">00</div>
            <div style="margin-top:6px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;">Min</div>
          </div>

          <div style="font-size:28px;font-weight:700;line-height:1;padding-bottom:18px;">:</div>

          <div style="display:flex;flex-direction:column;align-items:center;">
            <div id="vumcSeconds" style="
              min-width:72px;
              padding:14px 10px;
              border-radius:14px;
              background:rgba(0,0,0,.46);
              border:1px solid rgba(255,255,255,.20);
              font-size:clamp(24px,4vw,40px);
              font-weight:700;
              line-height:1;
              box-shadow:0 4px 14px rgba(0,0,0,.18);
            ">00</div>
            <div style="margin-top:6px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;">Sec</div>
          </div>
        </div>

        <div style="
          font-size:clamp(14px,2vw,18px);
          line-height:1.4;
          margin-bottom:4px;
          text-shadow:0 2px 6px rgba(0,0,0,.25);
        ">
          Traditional Worship — 9:30am
        </div>

        <div style="
          font-size:clamp(14px,2vw,18px);
          line-height:1.4;
          margin-bottom:12px;
          text-shadow:0 2px 6px rgba(0,0,0,.25);
        ">
          Contemporary Worship — 10:30am
        </div>

        <div style="
          font-size:13px;
          opacity:.92;
          text-shadow:0 2px 6px rgba(0,0,0,.25);
        ">
          Live video will appear here automatically when the stream is active.
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(async function () {
  const endpoint = 'https://script.google.com/macros/s/AKfycbxClNiX6jIT7ykEIox3Qw-dzynO4TgGhqbdTTzOzESS9C8ZxCRNiLLAuc3bSYFKVbg/exec';

  const iframe = document.getElementById('vumcLiveFrame');
  const offlinePanel = document.getElementById('vumcOfflinePanel');
  const serviceLabelEl = document.getElementById('vumcServiceLabel');

  const daysEl = document.getElementById('vumcDays');
  const hoursEl = document.getElementById('vumcHours');
  const minutesEl = document.getElementById('vumcMinutes');
  const secondsEl = document.getElementById('vumcSeconds');

  let currentVideoId = '';

  function getNextServiceDate() {
    const now = new Date();
    const day = now.getDay();

    const traditional = new Date(now);
    traditional.setHours(9, 30, 0, 0);

    const contemporary = new Date(now);
    contemporary.setHours(10, 30, 0, 0);

    if (day === 0) {
      if (now < traditional) {
        serviceLabelEl.textContent = 'Traditional Worship Begins In';
        return traditional;
      }
      if (now < contemporary) {
        serviceLabelEl.textContent = 'Contemporary Worship Begins In';
        return contemporary;
      }
    }

    const nextSunday = new Date(now);
    const daysUntilSunday = ((7 - day) % 7) || 7;
    nextSunday.setDate(now.getDate() + daysUntilSunday);
    nextSunday.setHours(9, 30, 0, 0);

    serviceLabelEl.textContent = 'Next Service Begins In';
    return nextSunday;
  }

  function updateCountdown() {
    const now = new Date();
    const nextService = getNextServiceDate();
    let diff = Math.floor((nextService - now) / 1000);

    if (diff < 0) diff = 0;

    const days = Math.floor(diff / 86400);
    diff %= 86400;
    const hours = Math.floor(diff / 3600);
    diff %= 3600;
    const minutes = Math.floor(diff / 60);
    const seconds = diff % 60;

    daysEl.textContent = String(days).padStart(2, '0');
    hoursEl.textContent = String(hours).padStart(2, '0');
    minutesEl.textContent = String(minutes).padStart(2, '0');
    secondsEl.textContent = String(seconds).padStart(2, '0');
  }

  async function checkLive() {
    try {
      const res = await fetch(endpoint + '?t=' + Date.now(), {
        method: 'GET',
        cache: 'no-store'
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      const data = await res.json();

      if (data && data.ok && data.live && data.videoId) {
        if (currentVideoId !== data.videoId) {
          currentVideoId = data.videoId;
          iframe.src = 'https://www.youtube.com/embed/' + data.videoId + '?autoplay=1&mute=1&rel=0';
        }
        iframe.style.display = 'block';
        offlinePanel.style.display = 'none';
      } else {
        currentVideoId = '';
        iframe.src = '';
        iframe.style.display = 'none';
        offlinePanel.style.display = 'flex';
      }
    } catch (err) {
      console.log('Live check failed:', err);
      currentVideoId = '';
      iframe.src = '';
      iframe.style.display = 'none';
      offlinePanel.style.display = 'flex';
    }
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);

  await checkLive();
  setInterval(checkLive, 30000);
})();
</script>
