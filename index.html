<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VUMC Watch Live</title>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
}

/* CENTER EVERYTHING */
body{
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CONTAINER */
#vumcWrap{
  width:100%;
  max-width:960px;
  padding:20px;
  box-sizing:border-box;
}

/* PLAYER FRAME */
#vumcFrame{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  border-radius:18px;
  overflow:hidden;
  background:#000;
}

/* YOUTUBE */
#vumcLiveFrame{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  display:none;
}

/* OFFLINE PANEL */
#vumcOffline{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  padding:24px;
  box-sizing:border-box;
  background:
    linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
    url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVeu24CGoxKiGKIMqt16SMry2rYHrAFStWTA&s') center/cover no-repeat;
}

/* CONTENT */
#vumcInner{
  max-width:700px;
  width:100%;
}

#vumcTitle{
  font-size:clamp(22px,3vw,34px);
  font-weight:700;
  margin-bottom:18px;
}

/* COUNTDOWN */
#vumcCountdown{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.vumcBox{
  min-width:70px;
  padding:14px 10px;
  border-radius:14px;
  background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.2);
  font-size:clamp(22px,4vw,36px);
  font-weight:700;
}

.vumcLabel{
  font-size:12px;
  margin-top:6px;
  text-transform:uppercase;
}

/* TIMES */
.vumcTimes{
  margin-bottom:14px;
  font-size:clamp(14px,2vw,18px);
}

/* BUTTON */
#vumcBtn{
  display:inline-block;
  background:#d4af37;
  color:#000;
  padding:12px 20px;
  border-radius:999px;
  text-decoration:none;
  font-weight:800;
  margin-bottom:12px;
}

/* MOBILE SWITCH */
.vumc-desktop{ display:block; }
.vumc-mobile{ display:none; }

@media (max-width: 767px){
  body{ align-items:flex-start; }

  .vumc-desktop{ display:none; }
  .vumc-mobile{ display:block; }

  #vumcWrap{ padding:12px; }
}
</style>
</head>

<body>

<div id="vumcWrap">
  <div id="vumcFrame">

    <!-- PLAYER -->
    <iframe id="vumcLiveFrame"></iframe>

    <!-- OFFLINE -->
    <div id="vumcOffline">
      <div id="vumcInner">

        <div id="vumcTitle">Next Service Begins In</div>

        <!-- DESKTOP COUNTDOWN -->
        <div id="vumcCountdown" class="vumc-desktop">
          <div>
            <div id="d" class="vumcBox">00</div>
            <div class="vumcLabel">Days</div>
          </div>
          <div>
            <div id="h" class="vumcBox">00</div>
            <div class="vumcLabel">Hours</div>
          </div>
          <div>
            <div id="m" class="vumcBox">00</div>
            <div class="vumcLabel">Min</div>
          </div>
          <div>
            <div id="s" class="vumcBox">00</div>
            <div class="vumcLabel">Sec</div>
          </div>
        </div>

        <!-- MOBILE SCHEDULE -->
        <div class="vumc-mobile vumcTimes">
          Traditional Worship — 9:30am<br>
          Contemporary Worship — 10:30am
        </div>

        <!-- DESKTOP TIMES -->
        <div class="vumcTimes vumc-desktop">
          Traditional Worship — 9:30am<br>
          Contemporary Worship — 10:30am
        </div>

        <a id="vumcBtn" href="https://www.versaillesumc.org/plan-your-visit" target="_blank">
          PLAN YOUR VISIT
        </a>

        <div style="font-size:13px;opacity:.85;">
          Live video will appear automatically when active
        </div>

      </div>
    </div>

  </div>
</div>

<script>
(async function () {

const endpoint = "PASTE_YOUR_GOOGLE_SCRIPT_URL";

const frame = document.getElementById("vumcLiveFrame");
const offline = document.getElementById("vumcOffline");

let currentVideo = "";

/* COUNTDOWN */
function nextSunday(){
  const now = new Date();
  const d = now.getDay();
  const diff = (7 - d) || 7;

  const next = new Date(now);
  next.setDate(now.getDate()+diff);
  next.setHours(9,30,0,0);

  return next;
}

function tick(){
  const now = new Date();
  const target = nextSunday();
  let diff = Math.floor((target - now)/1000);

  if(diff < 0) diff = 0;

  const d = Math.floor(diff/86400);
  diff %= 86400;
  const h = Math.floor(diff/3600);
  diff %= 3600;
  const m = Math.floor(diff/60);
  const s = diff % 60;

  document.getElementById("d").textContent = String(d).padStart(2,"0");
  document.getElementById("h").textContent = String(h).padStart(2,"0");
  document.getElementById("m").textContent = String(m).padStart(2,"0");
  document.getElementById("s").textContent = String(s).padStart(2,"0");
}

/* LIVE CHECK */
async function checkLive(){
  try{
    const res = await fetch(endpoint + "?t=" + Date.now());
    const data = await res.json();

    if(data.ok && data.live){
      if(currentVideo !== data.videoId){
        currentVideo = data.videoId;
        frame.src = "https://www.youtube.com/embed/" + data.videoId + "?autoplay=1&mute=1";
      }

      frame.style.display = "block";
      offline.style.display = "none";

    } else {
      currentVideo = "";
      frame.style.display = "none";
      offline.style.display = "flex";
    }

  }catch(e){
    frame.style.display = "none";
    offline.style.display = "flex";
  }
}

tick();
setInterval(tick,1000);

await checkLive();
setInterval(checkLive,30000);

})();
</script>

</body>
</html>
