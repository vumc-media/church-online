<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUMC Watch Live</title>
  <style>
    html, body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      background:#000;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#000;
    }

    #vumc-full-wrap{
      width:100%;
      min-height:100vh;
      background:#000;
      padding:24px 16px;
      box-sizing:border-box;
    }

    /* THIS centers the whole player card */
    #vumc-live-panel{
      width:min(100%, 960px);
      margin:0 auto;
      font-family:Arial, Helvetica, sans-serif;
    }

    /* THIS keeps the actual player frame centered and contained */
    #vumc-live-panel .vumc-frame{
      position:relative;
      width:100%;
      aspect-ratio:16 / 9;
      border-radius:18px;
      overflow:hidden;
      color:#fff;
      background:#000;
      margin:0 auto;
    }

    #vumc-live-panel .vumc-player{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      z-index:1;
      background:#000;
    }

    #vumc-live-panel .vumc-bg{
      position:absolute;
      inset:0;
      z-index:2;
      background:
        linear-gradient(
          rgba(0,0,0,.30),
          rgba(0,0,0,.12),
          rgba(0,0,0,.40)
        ),
        url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVeu24CGoxKiGKIMqt16SMry2rYHrAFStWTA&s");
      background-size:cover;
      background-position:center;
      filter:brightness(1.08) contrast(1.04);
      transition:opacity .35s ease, visibility .35s ease;
    }

    #vumc-live-panel .vumc-bg.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    #vumc-live-panel .vumc-logo-wrap{
      position:absolute;
      top:16px;
      left:16px;
      z-index:4;
      transition:opacity .35s ease, visibility .35s ease;
    }

    #vumc-live-panel .vumc-logo-wrap.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    #vumc-live-panel .vumc-logo{
      width:54px;
      height:54px;
      object-fit:contain;
      border-radius:10px;
      background:rgba(0,0,0,.30);
      padding:6px;
      border:1px solid rgba(255,255,255,.18);
      box-sizing:border-box;
    }

    #vumc-live-panel .vumc-content{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
      z-index:3;
      transition:opacity .35s ease, visibility .35s ease;
      box-sizing:border-box;
    }

    #vumc-live-panel .vumc-content.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    #vumc-live-panel .vumc-inner{
      max-width:620px;
      width:100%;
      margin:0 auto;
    }

    #vumc-live-panel .vumc-title{
      font-size:clamp(28px,4vw,40px);
      font-weight:700;
      margin-bottom:8px;
    }

    #vumc-live-panel .vumc-date{
      font-size:clamp(18px,2.4vw,24px);
      font-weight:600;
      margin-bottom:16px;
      color:rgba(255,255,255,.95);
    }

    #vumc-live-panel .vumc-timer{
      display:flex;
      justify-content:center;
      gap:12px;
      margin:0 0 18px 0;
      flex-wrap:wrap;
    }

    #vumc-live-panel .vumc-box{
      min-width:92px;
      padding:14px 12px;
      border-radius:14px;
      background:rgba(0,0,0,.30);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter:blur(2px);
      box-sizing:border-box;
    }

    #vumc-live-panel .vumc-box span{
      display:block;
      font-size:clamp(26px,3vw,34px);
      font-weight:700;
      line-height:1;
      margin-bottom:6px;
    }

    #vumc-live-panel .vumc-box small{
      display:block;
      font-size:11px;
      letter-spacing:1px;
      color:rgba(255,255,255,.88);
    }

    #vumc-live-panel .vumc-times{
      font-size:clamp(16px,2vw,20px);
      line-height:1.35;
      margin-bottom:14px;
    }

    #vumc-live-panel .vumc-btn-wrap{
      margin-top:4px;
    }

    #vumc-live-panel .vumc-visit-btn{
      display:inline-block;
      background:#d4af37;
      color:#000;
      text-decoration:none;
      padding:12px 22px;
      border-radius:999px;
      font-size:14px;
      font-weight:800;
      letter-spacing:.3px;
    }

    #vumc-live-panel .vumc-live-badge{
      position:absolute;
      left:16px;
      bottom:16px;
      z-index:5;
      display:none;
      align-items:center;
      gap:8px;
      background:rgba(0,0,0,.72);
      color:#fff;
      font-size:13px;
      font-weight:800;
      padding:10px 14px;
      border-radius:999px;
      backdrop-filter:blur(4px);
    }

    #vumc-live-panel .vumc-live-badge.show{
      display:flex;
    }

    #vumc-live-panel .vumc-live-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#ff2b2b;
      box-shadow:0 0 0 0 rgba(255,43,43,.9);
      animation:vumcPulse 1.6s infinite;
    }

    @keyframes vumcPulse{
      0%{ box-shadow:0 0 0 0 rgba(255,43,43,.85); }
      70%{ box-shadow:0 0 0 12px rgba(255,43,43,0); }
      100%{ box-shadow:0 0 0 0 rgba(255,43,43,0); }
    }

    @media (max-width: 767px){
      #vumc-full-wrap{
        padding:12px;
      }

      #vumc-live-panel{
        width:100%;
      }

      #vumc-live-panel .desktop-only{
        display:none !important;
      }

      #vumc-live-panel .vumc-frame{
        border-radius:14px;
      }

      #vumc-live-panel .vumc-logo-wrap{
        top:12px;
        left:12px;
      }

      #vumc-live-panel .vumc-logo{
        width:44px;
        height:44px;
        padding:5px;
      }

      #vumc-live-panel .vumc-content{
        padding:18px 14px;
      }

      #vumc-live-panel .vumc-title{
        font-size:clamp(22px,6vw,28px);
        margin-bottom:6px;
      }

      #vumc-live-panel .vumc-date{
        font-size:clamp(14px,4vw,18px);
        margin-bottom:12px;
      }

      #vumc-live-panel .vumc-times{
        font-size:clamp(14px,4vw,17px);
        line-height:1.3;
        margin-bottom:12px;
      }

      #vumc-live-panel .vumc-visit-btn{
        font-size:13px;
        padding:10px 18px;
      }

      #vumc-live-panel .vumc-live-badge{
        left:10px;
        bottom:10px;
        font-size:12px;
        padding:8px 12px;
      }
    }
  </style>
</head>
<body>

  <div id="vumc-full-wrap">
    <div id="vumc-live-panel">
      <div class="vumc-frame">

        <iframe
          id="vumc-player"
          class="vumc-player"
          src="https://www.youtube.com/embed?autoplay=1&rel=0"
          title="Versailles UMC Live Stream"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>

        <div class="vumc-bg"></div>

        <div class="vumc-logo-wrap">
          <img
            src="https://yt3.googleusercontent.com/0VzY1FMygvH9BmYV_gu_hNyZsW1kY5VPDdeRtHxyzfcXtqM5Rc6Kongrr_dw3v5I_hwJv63vIQ=s900-c-k-c0x00ffffff-no-rj"
            alt="VUMC Logo"
            class="vumc-logo"
          />
        </div>

        <div class="vumc-content" id="vumc-overlay">
          <div class="vumc-inner">

            <div class="vumc-title" id="vumc-service-label">Next Service Begins In</div>

            <div class="vumc-date" id="vumc-date">Sunday, Month 00, 0000</div>

            <div class="vumc-timer desktop-only" id="vumc-timer">
              <div class="vumc-box">
                <span id="vumc-days">0</span>
                <small>DAYS</small>
              </div>
              <div class="vumc-box">
                <span id="vumc-hours">0</span>
                <small>HOURS</small>
              </div>
              <div class="vumc-box">
                <span id="vumc-minutes">0</span>
                <small>MINUTES</small>
              </div>
              <div class="vumc-box">
                <span id="vumc-seconds">0</span>
                <small>SECONDS</small>
              </div>
            </div>

            <div class="vumc-times">
              Traditional Worship — 9:30 AM<br>
              Contemporary Worship — 10:30 AM
            </div>

            <div class="vumc-btn-wrap">
              <a
                class="vumc-visit-btn"
                href="https://www.versaillesumc.org/plan-your-visit"
                target="_blank"
                rel="noopener">
                PLAN YOUR VISIT
              </a>
            </div>

          </div>
        </div>

        <div class="vumc-live-badge" id="vumc-live-badge">
          <span class="vumc-live-dot"></span>
          LIVE NOW
        </div>

      </div>
    </div>
  </div>

  <script>
    (function () {
      const API_KEY = "AIzaSyB399WgOmDUGG6pyoq0oo1Rdzi3iBjwnXE";
      const CHANNEL_ID = "UC_svgodM3blLqWEBQ5yNjmA";
      const TZ = "America/New_York";

      const dateEl = document.getElementById("vumc-date");
      const labelEl = document.getElementById("vumc-service-label");
      const daysEl = document.getElementById("vumc-days");
      const hoursEl = document.getElementById("vumc-hours");
      const minutesEl = document.getElementById("vumc-minutes");
      const secondsEl = document.getElementById("vumc-seconds");

      const overlayEl = document.getElementById("vumc-overlay");
      const bgEl = document.querySelector("#vumc-live-panel .vumc-bg");
      const logoEl = document.querySelector("#vumc-live-panel .vumc-logo-wrap");
      const liveBadgeEl = document.getElementById("vumc-live-badge");
      const playerEl = document.getElementById("vumc-player");

      let currentLiveVideoId = null;

      function parts(date){
        const p = new Intl.DateTimeFormat("en-US", {
          timeZone: TZ,
          year: "numeric",
          month: "numeric",
          day: "numeric",
          hour: "numeric",
          minute: "numeric",
          second: "numeric",
          hour12: false,
          weekday: "short"
        }).formatToParts(date);

        const m = {};
        p.forEach(x => {
          if (x.type !== "literal") m[x.type] = x.value;
        });

        return {
          y: +m.year,
          mo: +m.month,
          d: +m.day,
          h: +m.hour,
          mi: +m.minute,
          s: +m.second,
          w: m.weekday
        };
      }

      function zonedUTC(y, mo, d, h, mi, s){
        const guess = new Date(Date.UTC(y, mo - 1, d, h, mi, s));
        const z = parts(guess);
        const shown = Date.UTC(z.y, z.mo - 1, z.d, z.h, z.mi, z.s);
        const want = Date.UTC(y, mo - 1, d, h, mi, s);
        return new Date(guess.getTime() + (want - shown));
      }

      function addDays(y, mo, d, amount){
        const dt = new Date(Date.UTC(y, mo - 1, d + amount));
        return {
          y: dt.getUTCFullYear(),
          mo: dt.getUTCMonth() + 1,
          d: dt.getUTCDate()
        };
      }

      function getNextService() {
        const now = new Date();
        const z = parts(now);
        const mins = z.h * 60 + z.mi;

        const traditionalStart = 570;
        const contemporaryStart = 630;

        if (z.w === "Sun") {
          if (mins < traditionalStart) {
            return zonedUTC(z.y, z.mo, z.d, 9, 30, 0);
          }
          if (mins < contemporaryStart) {
            return zonedUTC(z.y, z.mo, z.d, 10, 30, 0);
          }
        }

        const map = {Sun:0, Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6};
        let daysUntilSunday = (7 - map[z.w]) % 7;
        if (daysUntilSunday === 0) daysUntilSunday = 7;

        const nextSunday = addDays(z.y, z.mo, z.d, daysUntilSunday);
        return zonedUTC(nextSunday.y, nextSunday.mo, nextSunday.d, 9, 30, 0);
      }

      function formatDate(d) {
        return d.toLocaleDateString("en-US", {
          timeZone: TZ,
          weekday: "long",
          month: "long",
          day: "numeric",
          year: "numeric"
        });
      }

      function updateCountdown() {
        const now = new Date();
        const nextService = getNextService();
        const diff = Math.max(0, nextService - now);

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        daysEl.textContent = days;
        hoursEl.textContent = String(hours).padStart(2, "0");
        minutesEl.textContent = String(minutes).padStart(2, "0");
        secondsEl.textContent = String(seconds).padStart(2, "0");

        dateEl.textContent = formatDate(nextService);
        labelEl.textContent = "Next Service Begins In";
      }

      function showLive(videoId) {
        if (currentLiveVideoId !== videoId) {
          currentLiveVideoId = videoId;
          playerEl.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1&rel=0";
        }

        overlayEl.classList.add("hidden");
        bgEl.classList.add("hidden");
        logoEl.classList.add("hidden");
        liveBadgeEl.classList.add("show");
      }

      function showOffline() {
        currentLiveVideoId = null;
        playerEl.src = "https://www.youtube.com/embed/live_stream?channel=" + CHANNEL_ID + "&autoplay=1&rel=0";

        overlayEl.classList.remove("hidden");
        bgEl.classList.remove("hidden");
        logoEl.classList.remove("hidden");
        liveBadgeEl.classList.remove("show");
      }

      async function checkYouTubeLive() {
        try {
          const url =
            "https://www.googleapis.com/youtube/v3/search" +
            "?part=snippet" +
            "&channelId=" + encodeURIComponent(CHANNEL_ID) +
            "&eventType=live" +
            "&type=video" +
            "&maxResults=1" +
            "&key=" + encodeURIComponent(API_KEY);

          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error("YouTube API request failed");

          const data = await res.json();
          const item = data.items && data.items[0];

          if (item && item.id && item.id.videoId) {
            showLive(item.id.videoId);
          } else {
            showOffline();
          }
        } catch (err) {
          console.error("Live check failed:", err);
          showOffline();
        }
      }

      updateCountdown();
      checkYouTubeLive();

      setInterval(updateCountdown, 1000);
      setInterval(checkYouTubeLive, 60000);
    })();
  </script>

</body>
</html>
